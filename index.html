<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Body Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #050a15;
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
}

.page-title {
  color: #E5B869;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 6px;
  text-transform: uppercase;
  text-shadow: 0 0 30px #E5B869aa;
  margin-bottom: 10px;
  text-align: center;
}

.page-sub {
  color: #4FC3F7;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 30px;
  text-align: center;
}

/* ── MAIN CONTAINER ── */
.container {
  position: relative;
  width: 900px;
  max-width: 98vw;
}

/* ── IMAGE WRAPPER ── */
.image-wrapper {
  position: relative;
  width: 100%;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 60px #4FC3F733, 0 0 120px #E5B86922;
  border: 1px solid #4FC3F722;
}

.image-wrapper img {
  width: 100%;
  display: block;
  border-radius: 20px;
}

/* ── HOTSPOT BUTTON ── */
.hotspot {
  position: absolute;
  transform: translate(-50%, -50%);
  cursor: pointer;
  z-index: 20;
}

.hotspot-ring {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(79, 195, 247, 0.15);
  border: 2px solid #4FC3F7;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  position: relative;
  box-shadow: 0 0 15px #4FC3F755;
  animation: pulseRing 2s ease-in-out infinite;
}

.hotspot:hover .hotspot-ring,
.hotspot.active .hotspot-ring {
  background: rgba(229, 184, 105, 0.3);
  border-color: #E5B869;
  box-shadow: 0 0 25px #E5B869aa;
  transform: scale(1.2);
  animation: none;
}

.hotspot-icon {
  font-size: 18px;
  line-height: 1;
}

.hotspot-label {
  position: absolute;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(5, 15, 30, 0.9);
  border: 1px solid #4FC3F744;
  color: #4FC3F7;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 20px;
  white-space: nowrap;
  pointer-events: none;
}

.hotspot.active .hotspot-label {
  color: #E5B869;
  border-color: #E5B86966;
}

/* Pulse animation */
@keyframes pulseRing {
  0%, 100% { box-shadow: 0 0 10px #4FC3F755, 0 0 0 0 #4FC3F733; }
  50%       { box-shadow: 0 0 20px #4FC3F7aa, 0 0 12px 8px #4FC3F711; }
}

/* Ripple on click */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(229, 184, 105, 0.4);
  animation: rippleAnim 0.6s ease-out forwards;
  pointer-events: none;
  width: 60px;
  height: 60px;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0);
}
@keyframes rippleAnim {
  to { transform: translate(-50%,-50%) scale(3); opacity: 0; }
}

/* ── INFO PANEL ── */
.info-panel {
  position: absolute;
  right: -300px;
  top: 50%;
  transform: translateY(-50%);
  width: 270px;
  background: linear-gradient(135deg, rgba(5,15,35,0.97), rgba(10,25,55,0.97));
  border: 1px solid #4FC3F744;
  border-radius: 16px;
  padding: 24px 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease, right 0.4s ease;
  box-shadow: 0 0 40px #4FC3F722, 0 20px 60px rgba(0,0,0,0.5);
  z-index: 100;
}

.info-panel.visible {
  opacity: 1;
  pointer-events: all;
  right: -290px;
}

.panel-icon {
  font-size: 36px;
  text-align: center;
  margin-bottom: 12px;
}

.panel-title {
  color: #E5B869;
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-align: center;
  text-shadow: 0 0 15px #E5B869aa;
  margin-bottom: 6px;
}

.panel-subtitle {
  color: #4FC3F7;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 14px;
  opacity: 0.8;
}

.panel-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, #E5B86966, transparent);
  margin-bottom: 14px;
}

.panel-desc {
  color: #c8dff0;
  font-size: 12px;
  line-height: 1.7;
  margin-bottom: 14px;
}

.panel-facts {
  list-style: none;
}

.panel-facts li {
  color: #8ab8cc;
  font-size: 11px;
  padding: 5px 0;
  border-bottom: 1px solid #ffffff0a;
  display: flex;
  align-items: center;
  gap: 8px;
}

.panel-facts li::before {
  content: '◆';
  color: #E5B869;
  font-size: 7px;
  flex-shrink: 0;
}

.panel-close {
  position: absolute;
  top: 10px;
  right: 12px;
  color: #4FC3F7;
  cursor: pointer;
  font-size: 16px;
  opacity: 0.6;
  transition: opacity 0.2s, color 0.2s;
}
.panel-close:hover { opacity: 1; color: #E5B869; }

/* ── BOTTOM BUTTON BAR ── */
.btn-bar {
  display: flex;
  gap: 12px;
  margin-top: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: 30px;
  border: 1.5px solid #4FC3F755;
  background: rgba(79, 195, 247, 0.08);
  color: #4FC3F7;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn:hover, .btn.active {
  border-color: #E5B869;
  background: rgba(229, 184, 105, 0.15);
  color: #E5B869;
  box-shadow: 0 0 20px #E5B86933;
}

.btn-icon { font-size: 16px; }

/* ── SCAN LINE EFFECT ── */
.scan-line {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, transparent, #4FC3F7, transparent);
  opacity: 0.4;
  animation: scanDown 4s linear infinite;
  pointer-events: none;
  z-index: 5;
}
@keyframes scanDown {
  from { top: 0; }
  to   { top: 100%; }
}

/* Corner decorations */
.corner {
  position: absolute;
  width: 20px; height: 20px;
  border-color: #E5B869;
  border-style: solid;
  opacity: 0.6;
  z-index: 10;
}
.corner-tl { top: 8px; left: 8px;  border-width: 2px 0 0 2px; }
.corner-tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
.corner-bl { bottom: 8px; left: 8px;  border-width: 0 0 2px 2px; }
.corner-br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

@media (max-width: 700px) {
  .info-panel { display: none; }
  .btn-bar { gap: 8px; }
  .btn { padding: 8px 14px; font-size: 10px; }
}
</style>
</head>
<body>

<div class="page-title">Human Body Explorer</div>
<div class="page-sub">Click on any organ to discover</div>

<div class="container">

  <!-- IMAGE + HOTSPOTS -->
  <div class="image-wrapper" id="imageWrapper">

    <!-- Scan line -->
    <div class="scan-line"></div>

    <!-- Corner decorations -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- Background image -->
    <img src="https://i.imgur.com/placeholder.png"
         id="bodyImg"
         alt="Human Body"
         onerror="this.style.display='none'; document.getElementById('fallbackCanvas').style.display='block'">

    <!-- Fallback canvas if image doesn't load -->
    <canvas id="fallbackCanvas" width="900" height="506"
            style="display:block; width:100%; background: linear-gradient(135deg,#0a1828,#0d2040,#0a1828);"></canvas>

    <!-- ── HOTSPOTS ── -->

    <!-- BRAIN -->
    <div class="hotspot" id="btn-brain"
         style="left: 50%; top: 14%;"
         onclick="openPanel('brain', this)">
      <div class="hotspot-ring">
        <span class="hotspot-icon">🧠</span>
      </div>
      <div class="hotspot-label">Brain</div>
    </div>

    <!-- TONGUE (mouth area) -->
    <div class="hotspot" id="btn-tongue"
         style="left: 54%; top: 24%;"
         onclick="openPanel('tongue', this)">
      <div class="hotspot-ring">
        <span class="hotspot-icon">👅</span>
      </div>
      <div class="hotspot-label">Tongue</div>
    </div>

    <!-- HEART -->
    <div class="hotspot" id="btn-heart"
         style="left: 47%; top: 46%;"
         onclick="openPanel('heart', this)">
      <div class="hotspot-ring">
        <span class="hotspot-icon">❤️</span>
      </div>
      <div class="hotspot-label">Heart</div>
    </div>

    <!-- BLOOD CANAL (aorta area) -->
    <div class="hotspot" id="btn-blood"
         style="left: 53%; top: 55%;"
         onclick="openPanel('blood', this)">
      <div class="hotspot-ring">
        <span class="hotspot-icon">🩸</span>
      </div>
      <div class="hotspot-label">Blood Canal</div>
    </div>

    <!-- BONE (visible arm bone) -->
    <div class="hotspot" id="btn-bone"
         style="left: 30%; top: 52%;"
         onclick="openPanel('bone', this)">
      <div class="hotspot-ring">
        <span class="hotspot-icon">🦴</span>
      </div>
      <div class="hotspot-label">Bone</div>
    </div>

  </div><!-- /image-wrapper -->

  <!-- INFO PANEL -->
  <div class="info-panel" id="infoPanel">
    <span class="panel-close" onclick="closePanel()">✕</span>
    <div class="panel-icon" id="panelIcon"></div>
    <div class="panel-title" id="panelTitle"></div>
    <div class="panel-subtitle" id="panelSub"></div>
    <div class="panel-divider"></div>
    <div class="panel-desc" id="panelDesc"></div>
    <ul class="panel-facts" id="panelFacts"></ul>
  </div>

</div><!-- /container -->

<!-- BOTTOM BUTTON BAR -->
<div class="btn-bar">
  <button class="btn" onclick="openPanel('brain',  document.getElementById('btn-brain'))">
    <span class="btn-icon">🧠</span> Brain
  </button>
  <button class="btn" onclick="openPanel('tongue', document.getElementById('btn-tongue'))">
    <span class="btn-icon">👅</span> Tongue
  </button>
  <button class="btn" onclick="openPanel('heart',  document.getElementById('btn-heart'))">
    <span class="btn-icon">❤️</span> Heart
  </button>
  <button class="btn" onclick="openPanel('blood',  document.getElementById('btn-blood'))">
    <span class="btn-icon">🩸</span> Blood Canal
  </button>
  <button class="btn" onclick="openPanel('bone',   document.getElementById('btn-bone'))">
    <span class="btn-icon">🦴</span> Bone
  </button>
</div>

<script>
/* ══════════════════════════════════════════
   DATA
══════════════════════════════════════════ */
const DATA = {
  brain: {
    icon: '🧠',
    title: 'Brain',
    sub: 'Central Nervous System',
    desc: 'The brain is the command center of the human body — a complex organ that controls thought, memory, emotion, touch, motor skills, vision, breathing, and every process that regulates your body.',
    facts: [
      'Weight: ~1.4 kg (3 lbs)',
      '86 billion neurons inside',
      'Uses 20% of total body energy',
      'Generates 23 watts of power',
      'Can store ~2.5 petabytes of data',
      '100 trillion synaptic connections'
    ]
  },
  tongue: {
    icon: '👅',
    title: 'Tongue',
    sub: 'Taste & Speech Organ',
    desc: 'The tongue is a muscular organ in the mouth that is vital for chewing, swallowing, tasting, and speaking. It contains thousands of taste buds that detect sweet, salty, sour, bitter, and umami flavors.',
    facts: [
      '~8,000 taste buds total',
      'Taste buds renew every 2 weeks',
      'Detects 5 basic taste profiles',
      'Strongest muscle per gram in body',
      'Average length: ~9 cm',
      'Unique as a fingerprint'
    ]
  },
  heart: {
    icon: '❤️',
    title: 'Heart',
    sub: 'Cardiovascular Pump',
    desc: 'The heart is a muscular organ that pumps blood throughout the body via the circulatory system, supplying oxygen and nutrients to tissues and removing carbon dioxide and other wastes.',
    facts: [
      'Beats ~100,000 times per day',
      'Pumps ~5 liters/min of blood',
      'Size of a clenched fist',
      'Weight: 250–350 grams',
      'Generates its own electrical impulse',
      'Can beat outside the body'
    ]
  },
  blood: {
    icon: '🩸',
    title: 'Blood Canal',
    sub: 'Circulatory System',
    desc: 'The blood canal system — arteries, veins, and capillaries — forms an extensive network spanning 96,000 km. It delivers oxygen, nutrients, hormones, and removes waste products from every cell in the body.',
    facts: [
      '96,000 km of blood vessels',
      '5–6 liters of blood in adults',
      '25 trillion red blood cells',
      'Blood circulates in ~60 seconds',
      '4 blood types: A, B, AB, O',
      'Platelets repair damage in seconds'
    ]
  },
  bone: {
    icon: '🦴',
    title: 'Bone',
    sub: 'Skeletal System',
    desc: 'Bones form the rigid framework of the body — the skeleton. They protect vital organs, produce blood cells in their marrow, store minerals like calcium and phosphorus, and enable movement by providing attachment points for muscles.',
    facts: [
      '206 bones in adult human body',
      'Strongest material: cortical bone',
      'Bone marrow produces blood cells',
      'Bones are 70% mineral by weight',
      'Completely replaced every ~10 years',
      'Harder than reinforced concrete'
    ]
  }
};

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let activeOrgan = null;
let activeBtn   = null;

/* ══════════════════════════════════════════
   OPEN PANEL
══════════════════════════════════════════ */
function openPanel(organ, btnEl) {
  const d = DATA[organ];
  if (!d) return;

  // Reset previous
  if (activeBtn) {
    activeBtn.classList.remove('active');
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  }

  activeOrgan = organ;
  activeBtn   = btnEl;
  btnEl.classList.add('active');

  // Ripple effect
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  btnEl.querySelector('.hotspot-ring').appendChild(ripple);
  setTimeout(() => ripple.remove(), 700);

  // Fill panel
  document.getElementById('panelIcon').textContent  = d.icon;
  document.getElementById('panelTitle').textContent = d.title;
  document.getElementById('panelSub').textContent   = d.sub;
  document.getElementById('panelDesc').textContent  = d.desc;

  const factsEl = document.getElementById('panelFacts');
  factsEl.innerHTML = '';
  d.facts.forEach(f => {
    const li = document.createElement('li');
    li.textContent = f;
    factsEl.appendChild(li);
  });

  // Show panel
  document.getElementById('infoPanel').classList.add('visible');

  // Also highlight matching bottom button
  document.querySelectorAll('.btn').forEach(b => {
    if (b.textContent.toLowerCase().includes(organ === 'blood' ? 'blood' : organ)) {
      b.classList.add('active');
    }
  });
}

/* ══════════════════════════════════════════
   CLOSE PANEL
══════════════════════════════════════════ */
function closePanel() {
  document.getElementById('infoPanel').classList.remove('visible');
  if (activeBtn) activeBtn.classList.remove('active');
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  activeOrgan = null;
  activeBtn   = null;
}

/* ══════════════════════════════════════════
   FALLBACK CANVAS — draw body if img fails
══════════════════════════════════════════ */
(function drawFallback() {
  const canvas = document.getElementById('fallbackCanvas');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // Background gradient
  const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.7);
  bg.addColorStop(0, '#0d2040');
  bg.addColorStop(0.6, '#080f20');
  bg.addColorStop(1, '#050a14');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // DNA helix (right side)
  drawDNA(ctx, W*0.75, H, 120, '#4FC3F7', '#E5B869');

  // Human silhouette
  const cx = W * 0.42, cy = H * 0.5;

  ctx.save();
  const bodyGrad = ctx.createLinearGradient(cx-120, 0, cx+120, H);
  bodyGrad.addColorStop(0, 'rgba(30,60,100,0.9)');
  bodyGrad.addColorStop(0.5, 'rgba(15,35,70,0.95)');
  bodyGrad.addColorStop(1, 'rgba(5,15,35,0.9)');

  // HEAD
  ctx.fillStyle = bodyGrad;
  ctx.strokeStyle = '#4FC3F788';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = '#4FC3F7';
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.ellipse(cx, H*0.12, 55, 65, 0, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();

  // NECK
  ctx.beginPath();
  ctx.rect(cx-22, H*0.22, 44, 40);
  ctx.fill(); ctx.stroke();

  // TORSO
  ctx.beginPath();
  ctx.moveTo(cx-130, H*0.25);
  ctx.bezierCurveTo(cx-140, H*0.35, cx-135, H*0.58, cx-100, H*0.65);
  ctx.lineTo(cx+80, H*0.65);
  ctx.bezierCurveTo(cx+115, H*0.58, cx+120, H*0.35, cx+110, H*0.25);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // LEFT ARM
  ctx.beginPath();
  ctx.moveTo(cx-130, H*0.25);
  ctx.bezierCurveTo(cx-155, H*0.35, cx-160, H*0.55, cx-145, H*0.70);
  ctx.lineTo(cx-125, H*0.68);
  ctx.bezierCurveTo(cx-135, H*0.54, cx-130, H*0.38, cx-110, H*0.30);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // RIGHT ARM
  ctx.beginPath();
  ctx.moveTo(cx+110, H*0.25);
  ctx.bezierCurveTo(cx+135, H*0.35, cx+140, H*0.55, cx+125, H*0.70);
  ctx.lineTo(cx+105, H*0.68);
  ctx.bezierCurveTo(cx+115, H*0.54, cx+110, H*0.38, cx+90, H*0.30);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // LEFT LEG
  ctx.beginPath();
  ctx.moveTo(cx-70, H*0.65);
  ctx.bezierCurveTo(cx-80, H*0.80, cx-78, H*0.92, cx-72, H);
  ctx.lineTo(cx-40, H);
  ctx.bezierCurveTo(cx-38, H*0.92, cx-35, H*0.80, cx-30, H*0.65);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // RIGHT LEG
  ctx.beginPath();
  ctx.moveTo(cx+10, H*0.65);
  ctx.bezierCurveTo(cx+15, H*0.80, ctx.i=0, H*0.92, cx+20, H);
  ctx.lineTo(cx+55, H);
  ctx.bezierCurveTo(cx+58, H*0.92, cx+60, H*0.80, cx+55, H*0.65);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  ctx.shadowBlur = 0;

  // BRAIN (glowing)
  const brainGrad = ctx.createRadialGradient(cx, H*0.10, 0, cx, H*0.10, 45);
  brainGrad.addColorStop(0, '#6ED4F7');
  brainGrad.addColorStop(0.5, '#2a80c0');
  brainGrad.addColorStop(1, 'rgba(10,40,80,0.2)');
  ctx.fillStyle = brainGrad;
  ctx.shadowColor = '#4FC3F7'; ctx.shadowBlur = 25;
  ctx.beginPath();
  ctx.ellipse(cx-10, H*0.10, 30, 24, -0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx+10, H*0.10, 30, 24, 0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // HEART (glowing orange)
  const hGrad = ctx.createRadialGradient(cx-10, H*0.42, 0, cx-10, H*0.42, 30);
  hGrad.addColorStop(0, '#ff9050');
  hGrad.addColorStop(0.5, '#d04010');
  hGrad.addColorStop(1, 'rgba(80,10,0,0.1)');
  ctx.fillStyle = hGrad;
  ctx.shadowColor = '#ff6020'; ctx.shadowBlur = 30;
  ctx.beginPath();
  ctx.moveTo(cx-10, H*0.46);
  ctx.bezierCurveTo(cx-12, H*0.44, cx-28, H*0.38, cx-28, H*0.40);
  ctx.bezierCurveTo(cx-28, H*0.34, cx-12, H*0.34, cx-10, H*0.38);
  ctx.bezierCurveTo(cx-8,  H*0.34, cx+8,  H*0.34, cx+8, H*0.40);
  ctx.bezierCurveTo(cx+8,  H*0.38, cx-8,  H*0.44, cx-10, H*0.46);
  ctx.fill();
  ctx.shadowBlur = 0;

  // BONE (arm bone visible)
  ctx.strokeStyle = '#c8a870aa';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.shadowColor = '#c8a870'; ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(cx-145, H*0.40);
  ctx.lineTo(cx-140, H*0.62);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // BLOOD VESSELS
  ctx.strokeStyle = '#e04010aa';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#ff4010'; ctx.shadowBlur = 8;
  // Aorta down
  ctx.beginPath();
  ctx.moveTo(cx-5, H*0.44);
  ctx.bezierCurveTo(cx-5, H*0.52, cx, H*0.58, cx-2, H*0.65);
  ctx.stroke();
  // Branch left
  ctx.beginPath();
  ctx.moveTo(cx-5, H*0.50);
  ctx.bezierCurveTo(cx-30, H*0.50, cx-55, H*0.52, cx-70, H*0.60);
  ctx.stroke();
  // Branch right
  ctx.beginPath();
  ctx.moveTo(cx-5, H*0.50);
  ctx.bezierCurveTo(cx+20, H*0.50, cx+45, H*0.52, cx+55, H*0.58);
  ctx.stroke();
